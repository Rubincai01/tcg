<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>价格监控面板</title>
  <style>
    :root {
      --bg: #0b1220;
      --panel: #121a2b;
      --panel-2: #18233a;
      --text: #e8eefc;
      --muted: #95a3bf;
      --red: #ff5b6c;
      --green: #2ccf87;
      --yellow: #f6c85f;
      --blue: #2d6df6;
      --line: rgba(255,255,255,0.08);
      --shadow: 0 20px 50px rgba(0,0,0,.28);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "PingFang SC", "Helvetica Neue", sans-serif;
      background: linear-gradient(180deg, #0b1220 0%, #0e1730 100%);
      color: var(--text);
      min-height: 100vh;
    }
    .wrap { max-width: 1280px; margin: 0 auto; padding: 28px 20px 40px; }

    /* ---------- hero ---------- */
    .hero { display: flex; justify-content: space-between; align-items: flex-start; gap: 20px; margin-bottom: 22px; }
    .hero h1 { margin: 0 0 8px; font-size: 32px; }
    .hero p { margin: 0; color: var(--muted); line-height: 1.6; }
    .actions { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
    .meta { color: var(--muted); font-size: 14px; }

    /* ---------- buttons ---------- */
    button, .btn {
      border: 0; background: var(--blue); color: white;
      padding: 9px 16px; border-radius: 10px; cursor: pointer;
      font-size: 14px; box-shadow: var(--shadow); transition: opacity .15s;
    }
    button:hover { opacity: .85; }
    .btn-sm { padding: 6px 12px; font-size: 12px; border-radius: 8px; }
    .btn-danger { background: #c0392b; }
    .btn-outline { background: transparent; border: 1px solid var(--line); color: var(--muted); }
    .btn-outline:hover { border-color: var(--blue); color: var(--blue); }
    .btn-green { background: var(--green); color: #0b1220; }

    /* ---------- cards ---------- */
    .cards { display: grid; grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 16px; margin-bottom: 18px; }
    .card { background: rgba(18,26,43,.88); backdrop-filter: blur(10px); border: 1px solid var(--line); border-radius: 18px; padding: 18px; box-shadow: var(--shadow); }
    .card .label { color: var(--muted); font-size: 13px; margin-bottom: 10px; }
    .card .value { font-size: 30px; font-weight: 700; }

    /* ---------- add-form ---------- */
    .add-panel {
      background: rgba(18,26,43,.88); border: 1px solid var(--line);
      border-radius: 18px; padding: 20px 22px; margin-bottom: 18px;
      box-shadow: var(--shadow); display: none;
    }
    .add-panel.open { display: block; }
    .add-panel h3 { margin: 0 0 16px; font-size: 18px; }
    .form-row { display: flex; gap: 12px; flex-wrap: wrap; align-items: flex-end; }
    .form-group { display: flex; flex-direction: column; gap: 6px; }
    .form-group label { font-size: 12px; color: var(--muted); font-weight: 600; }
    .form-group input, .form-group select {
      background: rgba(255,255,255,.06); border: 1px solid var(--line);
      color: var(--text); padding: 9px 12px; border-radius: 8px; font-size: 14px;
      outline: none; transition: border-color .15s;
    }
    .form-group input:focus, .form-group select:focus { border-color: var(--blue); }
    .form-group input::placeholder { color: rgba(255,255,255,.25); }
    .form-msg { margin-top: 12px; font-size: 13px; }
    .form-msg.ok { color: var(--green); }
    .form-msg.err { color: var(--red); }

    /* ---------- table ---------- */
    .table-panel {
      background: rgba(18,26,43,.88); border: 1px solid var(--line);
      border-radius: 18px; overflow: hidden; box-shadow: var(--shadow);
    }
    table { width: 100%; border-collapse: collapse; }
    th, td { padding: 13px 14px; border-bottom: 1px solid var(--line); text-align: left; font-size: 14px; vertical-align: middle; }
    th { color: var(--muted); background: rgba(255,255,255,.02); font-weight: 600; }
    tr:hover { background: rgba(255,255,255,.025); }
    tr.row-hit { background: linear-gradient(90deg, rgba(246,200,95,.14), rgba(246,200,95,.05)); box-shadow: inset 3px 0 0 var(--yellow); }
    tr.row-hit:hover { background: linear-gradient(90deg, rgba(246,200,95,.18), rgba(246,200,95,.07)); }
    .num { font-variant-numeric: tabular-nums; font-feature-settings: "tnum"; }
    .up { color: var(--red); }
    .down { color: var(--green); }
    .flat { color: var(--muted); }

    /* ---------- badges ---------- */
    .badge { display: inline-flex; align-items: center; border-radius: 999px; padding: 4px 10px; font-size: 12px; font-weight: 600; border: 1px solid transparent; white-space: nowrap; }
    .badge.hit { background: rgba(246,200,95,.12); color: var(--yellow); border-color: rgba(246,200,95,.24); }
    .badge.wait { background: rgba(255,255,255,.05); color: var(--muted); border-color: rgba(255,255,255,.08); }
    .signals { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 6px; }
    .signal-pill { display: inline-flex; align-items: center; padding: 3px 8px; border-radius: 999px; font-size: 11px; font-weight: 700; background: rgba(246,200,95,.14); color: var(--yellow); border: 1px solid rgba(246,200,95,.24); }

    .symbol { display: flex; flex-direction: column; gap: 4px; }
    .symbol small { color: var(--muted); }

    /* ---------- footer ---------- */
    .footer-note { color: var(--muted); font-size: 13px; margin-top: 12px; }
    .error { margin-top: 12px; color: #ff9aa5; font-size: 14px; }

    /* ---------- confirm dialog ---------- */
    .overlay { position: fixed; inset: 0; background: rgba(0,0,0,.55); display: flex; justify-content: center; align-items: center; z-index: 999; }
    .dialog { background: var(--panel); border: 1px solid var(--line); border-radius: 18px; padding: 28px; max-width: 400px; width: 90%; box-shadow: var(--shadow); }
    .dialog h3 { margin: 0 0 12px; }
    .dialog p { margin: 0 0 20px; color: var(--muted); font-size: 14px; }
    .dialog-actions { display: flex; gap: 10px; justify-content: flex-end; }

    @media (max-width: 900px) {
      .cards { grid-template-columns: 1fr; }
      .hero { flex-direction: column; }
      .table-panel { overflow-x: auto; }
      table { min-width: 1060px; }
      .form-row { flex-direction: column; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <!-- hero -->
    <div class="hero">
      <div>
        <h1>价格监控面板</h1>
        <p>实时查看港股、A股和场内 ETF 的当前价格、涨跌幅，以及入场 / 出场价是否已命中。</p>
      </div>
      <div class="actions">
        <button id="addBtn" class="btn-green btn-sm">＋ 添加标的</button>
        <button id="refreshBtn">立即刷新</button>
        <div class="meta">自动刷新：<span id="refreshInterval">--</span> 秒</div>
      </div>
    </div>

    <!-- add form -->
    <div class="add-panel" id="addPanel">
      <h3>添加监控标的</h3>
      <div class="form-row">
        <div class="form-group">
          <label>证券代码</label>
          <input id="fSymbol" type="text" placeholder="00700" style="width:120px" />
        </div>
        <div class="form-group">
          <label>市场</label>
          <select id="fMarket" style="width:100px">
            <option value="HK">港股</option>
            <option value="A">A 股</option>
          </select>
        </div>
        <div class="form-group">
          <label>名称（选填）</label>
          <input id="fName" type="text" placeholder="腾讯控股" style="width:140px" />
        </div>
        <div class="form-group">
          <label>入场价</label>
          <input id="fEntry" type="text" placeholder="500" style="width:110px" />
        </div>
        <div class="form-group">
          <label>出场价</label>
          <input id="fExit" type="text" placeholder="540" style="width:110px" />
        </div>
        <div class="form-group">
          <label>&nbsp;</label>
          <button id="submitAdd">确认添加</button>
        </div>
        <div class="form-group">
          <label>&nbsp;</label>
          <button id="cancelAdd" class="btn-outline btn-sm">取消</button>
        </div>
      </div>
      <div class="form-msg" id="formMsg"></div>
    </div>

    <!-- cards -->
    <div class="cards">
      <div class="card"><div class="label">监控标的数量</div><div class="value" id="targetCount">--</div></div>
      <div class="card"><div class="label">当前命中提醒数</div><div class="value" id="alertCount">--</div></div>
      <div class="card"><div class="label">最近更新时间</div><div class="value" id="updatedAt" style="font-size:22px">--</div></div>
    </div>

    <!-- table -->
    <div class="table-panel">
      <table>
        <thead>
          <tr>
            <th>标的</th>
            <th>市场</th>
            <th>现价</th>
            <th>涨跌额</th>
            <th>涨跌幅</th>
            <th>入场价</th>
            <th>入场状态</th>
            <th>出场价</th>
            <th>出场状态</th>
            <th style="width:70px">操作</th>
          </tr>
        </thead>
        <tbody id="tableBody"></tbody>
      </table>
    </div>

    <div class="footer-note">上涨红色，下跌绿色（A股/港股习惯）。已命中的标的会整行高亮。点击"删除"按钮可移除标的，点击"＋ 添加标的"按钮可在页面上添加新标的。</div>
    <div class="error" id="errorBox"></div>
  </div>

  <!-- confirm dialog (hidden) -->
  <div class="overlay" id="confirmOverlay" style="display:none">
    <div class="dialog">
      <h3 id="confirmTitle">确认操作</h3>
      <p id="confirmText"></p>
      <div class="dialog-actions">
        <button class="btn-outline btn-sm" id="confirmCancel">取消</button>
        <button class="btn-danger btn-sm" id="confirmOk">确认删除</button>
      </div>
    </div>
  </div>

  <script>
    let timer = null;
    let pendingDelete = null;

    /* ---- helpers ---- */
    function formatNum(value, digits = 3) {
      if (value === null || value === undefined || Number.isNaN(Number(value))) return '--';
      return Number(value).toFixed(digits);
    }
    function priceClass(value) {
      const num = Number(value);
      if (Number.isNaN(num) || num === 0) return 'flat';
      return num > 0 ? 'up' : 'down';
    }
    function badge(hit) {
      return `<span class="badge ${hit ? 'hit' : 'wait'}">${hit ? '已命中' : '等待中'}</span>`;
    }
    function signalBadges(row) {
      const items = [];
      if (row.entry_met) items.push('<span class="signal-pill">入场已命中</span>');
      if (row.exit_met) items.push('<span class="signal-pill">出场已命中</span>');
      return items.length ? `<div class="signals">${items.join('')}</div>` : '';
    }
    function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }
    function marketLabel(m) { return m === 'HK' ? '港股' : 'A 股'; }

    /* ---- render ---- */
    function renderRows(rows) {
      const tbody = document.getElementById('tableBody');
      tbody.innerHTML = rows.map(row => `
        <tr class="${row.entry_met || row.exit_met ? 'row-hit' : ''}">
          <td>
            <div class="symbol">
              <strong>${esc(row.name)}</strong>
              <small>${esc(row.symbol)}</small>
              ${signalBadges(row)}
            </div>
          </td>
          <td>${marketLabel(row.market)}</td>
          <td class="num ${priceClass(row.change)}">${formatNum(row.price)}</td>
          <td class="num ${priceClass(row.change)}">${row.change === null ? '--' : (row.change > 0 ? '+' : '') + formatNum(row.change)}</td>
          <td class="num ${priceClass(row.change_pct)}">${row.change_pct === null ? '--' : (row.change_pct > 0 ? '+' : '') + formatNum(row.change_pct, 2) + '%'}</td>
          <td class="num">${formatNum(row.entry_price)}</td>
          <td>${badge(row.entry_met)}</td>
          <td class="num">${formatNum(row.exit_price)}</td>
          <td>${badge(row.exit_met)}</td>
          <td><button class="btn-danger btn-sm" onclick="askDelete('${esc(row.symbol)}','${esc(row.market)}','${esc(row.name)}')">删除</button></td>
        </tr>
      `).join('');
    }

    /* ---- fetch data ---- */
    async function refreshData() {
      const errorBox = document.getElementById('errorBox');
      errorBox.textContent = '';
      try {
        const response = await fetch('/api/quotes', { cache: 'no-store' });
        const data = await response.json();
        if (!response.ok) throw new Error(data.error || '刷新失败');
        document.getElementById('targetCount').textContent = data.target_count;
        document.getElementById('alertCount').textContent = data.alert_count;
        document.getElementById('updatedAt').textContent = data.generated_at;
        document.getElementById('refreshInterval').textContent = data.poll_interval_seconds;
        renderRows(data.rows || []);
        if (timer) clearInterval(timer);
        timer = setInterval(refreshData, Math.max(5, Number(data.poll_interval_seconds || 15)) * 1000);
      } catch (error) {
        errorBox.textContent = '刷新失败：' + error.message;
      }
    }

    /* ---- add target ---- */
    const addPanel = document.getElementById('addPanel');
    document.getElementById('addBtn').addEventListener('click', () => {
      addPanel.classList.toggle('open');
      document.getElementById('formMsg').textContent = '';
      if (addPanel.classList.contains('open')) document.getElementById('fSymbol').focus();
    });
    document.getElementById('cancelAdd').addEventListener('click', () => addPanel.classList.remove('open'));

    document.getElementById('submitAdd').addEventListener('click', async () => {
      const msgEl = document.getElementById('formMsg');
      msgEl.textContent = '';
      const symbol = document.getElementById('fSymbol').value.trim();
      const market = document.getElementById('fMarket').value;
      const name = document.getElementById('fName').value.trim();
      const entry = document.getElementById('fEntry').value.trim();
      const exit_ = document.getElementById('fExit').value.trim();
      if (!symbol) { msgEl.textContent = '请输入证券代码'; msgEl.className = 'form-msg err'; return; }
      try {
        const res = await fetch('/api/targets', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            symbol, market, name: name || symbol,
            entry_price: entry || null,
            exit_price: exit_ || null,
          }),
        });
        const data = await res.json();
        if (!res.ok || data.error) throw new Error(data.error || '添加失败');
        msgEl.textContent = `✅ ${data.message}`;
        msgEl.className = 'form-msg ok';
        document.getElementById('fSymbol').value = '';
        document.getElementById('fName').value = '';
        document.getElementById('fEntry').value = '';
        document.getElementById('fExit').value = '';
        refreshData();
      } catch (e) {
        msgEl.textContent = '❌ ' + e.message;
        msgEl.className = 'form-msg err';
      }
    });

    /* ---- delete target ---- */
    const overlay = document.getElementById('confirmOverlay');
    function askDelete(symbol, market, name) {
      pendingDelete = { symbol, market };
      document.getElementById('confirmText').textContent = `确定要删除 "${name}"（${symbol}，${marketLabel(market)}）吗？`;
      overlay.style.display = 'flex';
    }
    document.getElementById('confirmCancel').addEventListener('click', () => { overlay.style.display = 'none'; });
    document.getElementById('confirmOk').addEventListener('click', async () => {
      overlay.style.display = 'none';
      if (!pendingDelete) return;
      try {
        const res = await fetch('/api/targets/delete', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(pendingDelete),
        });
        const data = await res.json();
        if (!res.ok || data.error) throw new Error(data.error || '删除失败');
        refreshData();
      } catch (e) {
        document.getElementById('errorBox').textContent = '删除失败：' + e.message;
      }
      pendingDelete = null;
    });

    /* ---- keyboard shortcuts ---- */
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') {
        overlay.style.display = 'none';
        addPanel.classList.remove('open');
      }
    });

    /* ---- init ---- */
    document.getElementById('refreshBtn').addEventListener('click', refreshData);
    refreshData();
  </script>
</body>
</html>
