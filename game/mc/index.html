<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🃏 你的世界 TCG - 开卡模拟 & 牌店经营</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="intro-overlay" id="introOverlay">
  <!-- MC Pixel Background Layers -->
  <div class="intro-bg">
    <!-- Sky gradient -->
    <div class="intro-sky"></div>
    <!-- Stars layer -->
    <div class="intro-stars" id="introStars"></div>
    <!-- Sun/Moon -->
    <div class="intro-sun"></div>
    <!-- Clouds -->
    <div class="intro-clouds">
      <div class="intro-cloud c1">☁️</div>
      <div class="intro-cloud c2">☁️</div>
      <div class="intro-cloud c3">☁️</div>
      <div class="intro-cloud c4">⛅</div>
      <div class="intro-cloud c5">☁️</div>
    </div>
    <!-- Far mountains/trees silhouette -->
    <div class="intro-far-bg"></div>
    <!-- Trees row -->
    <div class="intro-trees">
      <span class="intro-tree t1">🌲</span>
      <span class="intro-tree t2">🌳</span>
      <span class="intro-tree t3">🌲</span>
      <span class="intro-tree t4">🌳</span>
      <span class="intro-tree t5">🌲</span>
      <span class="intro-tree t6">🌲</span>
      <span class="intro-tree t7">🌳</span>
      <span class="intro-tree t8">🌲</span>
      <span class="intro-tree t9">🌳</span>
      <span class="intro-tree t10">🌲</span>
      <span class="intro-tree t11">🌲</span>
      <span class="intro-tree t12">🌳</span>
    </div>
    <!-- Grass layer -->
    <div class="intro-grass"></div>
    <!-- Dirt layer -->
    <div class="intro-dirt"></div>
    <!-- Stone layer -->
    <div class="intro-stone"></div>
    <!-- Bedrock layer -->
    <div class="intro-bedrock"></div>
    <!-- Ore deposits in stone -->
    <div class="intro-ores">
      <span class="intro-ore ore-coal" style="left:12%;top:72%">⬛</span>
      <span class="intro-ore ore-iron" style="left:28%;top:78%">🟫</span>
      <span class="intro-ore ore-gold" style="left:55%;top:80%">🟨</span>
      <span class="intro-ore ore-diamond" style="left:75%;top:85%">💎</span>
      <span class="intro-ore ore-redstone" style="left:40%;top:88%">🔴</span>
      <span class="intro-ore ore-emerald" style="left:88%;top:75%">💚</span>
      <span class="intro-ore ore-coal" style="left:5%;top:82%">⬛</span>
      <span class="intro-ore ore-iron" style="left:65%;top:76%">🟫</span>
      <span class="intro-ore ore-lapis" style="left:48%;top:83%">🔵</span>
    </div>
    <!-- Floating MC items -->
    <div class="intro-float-items" id="introFloatItems"></div>
    <!-- Pixel grid overlay -->
    <div class="intro-pixel-grid"></div>
    <!-- Ambient particles -->
    <div class="intro-ambient" id="introAmbient"></div>
    <!-- Ground mobs -->
    <div class="intro-mobs">
      <span class="intro-mob mob-walk m1">🐄</span>
      <span class="intro-mob mob-walk m2">🐔</span>
      <span class="intro-mob mob-walk m3">🐷</span>
      <span class="intro-mob mob-walk m4">🐑</span>
    </div>
  </div>
  <!-- Content overlay -->
  <div class="intro-content">
    <div class="intro-logo-area">
      <div class="intro-logo-icon">
        <div class="intro-steve-holder">
          <!-- Steve pixel character (larger, holding graded card) -->
          <div class="intro-steve" data-skin="steve">
            <div class="pixel-steve" style="transform:scale(4);">
              <div class="pixel-steve-head"></div>
              <div class="pixel-steve-body"></div>
              <div class="pixel-steve-arm-l intro-arm-hold"></div>
              <div class="pixel-steve-arm-r intro-arm-hold-r"></div>
              <div class="pixel-steve-leg-l"></div>
              <div class="pixel-steve-leg-r"></div>
            </div>
            <!-- Graded card held in left hand -->
            <div class="intro-graded-card">
              <div class="intro-gc-slab-top">
                <div class="intro-gc-label">PSA</div>
                <div class="intro-gc-grade">10</div>
              </div>
              <div class="intro-gc-card-window">
                <div class="intro-gc-card-art">🐉</div>
              </div>
              <div class="intro-gc-name">末影龙</div>
            </div>
          </div>
        </div>
      </div>
      <div class="intro-title">你的世界 TCG</div>
      <div class="intro-title-shadow">你的世界 TCG</div>
    </div>
    <div class="intro-subtitle">集换式卡牌 · 开卡模拟 · 牌店经营</div>
    <div class="intro-card-preview">
      <span class="intro-preview-card pc1">🗡️</span>
      <span class="intro-preview-card pc2">💎</span>
      <span class="intro-preview-card pc3">🐉</span>
      <span class="intro-preview-card pc4">🔥</span>
      <span class="intro-preview-card pc5">⭐</span>
    </div>
    <button class="mc-btn gold intro-start-btn" onclick="startGame()">⚔️ 开始游戏</button>
    <div class="intro-version">v2.1 · Pixel Card Simulator</div>
    <div class="intro-tip">💡 开卡包 · 集卡牌 · 开牌店 · 评级交易</div>
  </div>
</div>

<div class="top-bar" id="topBar" style="display:none;">
  <div class="game-title">⛏️ MC-TCG</div>
  <div class="stats-bar">
    <div class="stat-item"><span class="stat-icon">💰</span><span>金币: </span><span class="stat-value" id="goldDisplay">500</span></div>
    <div
