<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>rubincai - 个人首页</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap');
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Orbitron', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #0a0e27;
            min-height: 100vh;
            color: #fff;
            overflow-x: hidden;
            position: relative;
        }

        /* 赛博朋克动态背景 */
        .cyber-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            background: 
                linear-gradient(45deg, #0a0e27 0%, #1a0a2e 25%, #16213e 50%, #0f3460 75%, #1a0a2e 100%);
            background-size: 400% 400%;
            animation: gradientShift 15s ease infinite;
        }

        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* 网格背景 */
        .grid-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            background-image: 
                linear-gradient(rgba(0, 255, 255, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 255, 255, 0.03) 1px, transparent 1px);
            background-size: 50px 50px;
            animation: gridMove 20s linear infinite;
        }

        @keyframes gridMove {
            0% { transform: perspective(500px) rotateX(60deg) translateY(0); }
            100% { transform: perspective(500px) rotateX(60deg) translateY(50px); }
        }

        /* 扫描线效果 */
        .scanline {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 2px;
            background: rgba(0, 255, 255, 0.5);
            z-index: 999;
            animation: scanline 8s linear infinite;
            box-shadow: 0 0 10px rgba(0, 255, 255, 0.5);
        }

        @keyframes scanline {
            0% { top: 0; }
            100% { top: 100%; }
        }

        /* 霓虹闪烁点 */
        .neon-dots {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            pointer-events: none;
        }

        .dot {
            position: absolute;
            width: 2px;
            height: 2px;
            background: #00ffff;
            border-radius: 50%;
            box-shadow: 0 0 10px #00ffff, 0 0 20px #00ffff;
            animation: twinkle 3s infinite;
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0; }
            50% { opacity: 1; }
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
            position: relative;
            z-index: 1;
        }

        .header {
            text-align: center;
            padding: 80px 0 60px;
            position: relative;
        }

        .author-name {
            font-size: 4rem;
            font-weight: 900;
            margin-bottom: 15px;
            letter-spacing: 8px;
            text-transform: uppercase;
            position: relative;
            color: #fff;
            text-shadow: 
                0 0 10px #00ffff,
                0 0 20px #00ffff,
                0 0 30px #00ffff,
                0 0 40px #ff00ff,
                0 0 70px #ff00ff,
                0 0 80px #ff00ff,
                0 0 100px #ff00ff;
            animation: neonFlicker 3s infinite alternate;
        }

        @keyframes neonFlicker {
            0%, 19%, 21%, 23%, 25%, 54%, 56%, 100% {
                text-shadow: 
                    0 0 10px #00ffff,
                    0 0 20px #00ffff,
                    0 0 30px #00ffff,
                    0 0 40px #ff00ff,
                    0 0 70px #ff00ff,
                    0 0 80px #ff00ff,
                    0 0 100px #ff00ff;
            }
            20%, 24%, 55% {
                text-shadow: none;
            }
        }

        /* 故障效果 */
        .glitch {
            position: relative;
        }

        .glitch::before,
        .glitch::after {
            content: 'Cyanexpo';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }

        .glitch::before {
            color: #ff00ff;
            animation: glitch-1 2s infinite linear alternate-reverse;
            clip-path: polygon(0 0, 100% 0, 100% 35%, 0 35%);
        }

        .glitch::after {
            color: #00ffff;
            animation: glitch-2 3s infinite linear alternate-reverse;
            clip-path: polygon(0 65%, 100% 65%, 100% 100%, 0 100%);
        }

        @keyframes glitch-1 {
            0% { transform: translate(0); }
            20% { transform: translate(-3px, 3px); }
            40% { transform: translate(-3px, -3px); }
            60% { transform: translate(3px, 3px); }
            80% { transform: translate(3px, -3px); }
            100% { transform: translate(0); }
        }

        @keyframes glitch-2 {
            0% { transform: translate(0); }
            20% { transform: translate(3px, -3px); }
            40% { transform: translate(3px, 3px); }
            60% { transform: translate(-3px, -3px); }
            80% { transform: translate(-3px, 3px); }
            100% { transform: translate(0); }
        }

        .author-title {
            font-size: 1.1rem;
            font-weight: 400;
            opacity: 0.9;
            margin-bottom: 30px;
            letter-spacing: 3px;
            color: #00ffff;
            text-transform: uppercase;
            text-shadow: 0 0 10px rgba(0, 255, 255, 0.5);
        }

        .nav-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 25px;
            padding: 40px 0;
        }

        .nav-card {
            background: rgba(10, 14, 39, 0.8);
            border: 2px solid rgba(0, 255, 255, 0.3);
            border-radius: 10px;
            padding: 35px 25px;
            text-align: center;
            text-decoration: none;
            color: #fff;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
            overflow: hidden;
            backdrop-filter: blur(10px);
            clip-path: polygon(
                0 0,
                calc(100% - 20px) 0,
                100% 20px,
                100% 100%,
                20px 100%,
                0 calc(100% - 20px)
            );
        }

        .nav-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(0, 255, 255, 0.2), transparent);
            transition: left 0.5s;
        }

        .nav-card:hover::before {
            left: 100%;
        }

        .nav-card::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 0;
            height: 3px;
            background: linear-gradient(90deg, #00ffff, #ff00ff);
            transition: width 0.5s;
        }

        .nav-card:hover::after {
            width: 100%;
        }

        .nav-card:hover {
            transform: translateY(-10px) scale(1.02);
            border-color: #00ffff;
            box-shadow: 
                0 0 20px rgba(0, 255, 255, 0.5),
                0 0 40px rgba(255, 0, 255, 0.3),
                inset 0 0 20px rgba(0, 255, 255, 0.1);
        }

        .nav-icon {
            font-size: 3rem;
            margin-bottom: 20px;
            background: linear-gradient(135deg, #00ffff, #ff00ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            filter: drop-shadow(0 0 10px rgba(0, 255, 255, 0.5));
            transition: all 0.3s;
        }

        .nav-card:hover .nav-icon {
            transform: scale(1.2) rotate(5deg);
            filter: drop-shadow(0 0 20px rgba(0, 255, 255, 0.8));
        }

        .nav-title {
            font-size: 1.4rem;
            font-weight: 700;
            margin-bottom: 12px;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: #00ffff;
            text-shadow: 0 0 10px rgba(0, 255, 255, 0.5);
        }

        .nav-desc {
            font-size: 0.9rem;
            color: #b8b8d1;
            line-height: 1.6;
            letter-spacing: 0.5px;
        }

        /* 装饰性线条 */
        .cyber-line {
            position: absolute;
            height: 1px;
            background: linear-gradient(90deg, transparent, #00ffff, transparent);
            width: 100%;
            opacity: 0.3;
        }

        .line-top { top: 0; }
        .line-bottom { bottom: 0; }

        .footer {
            text-align: center;
            padding: 50px 0;
            position: relative;
            margin-top: 40px;
        }

        .footer::before {
            content: '';
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 200px;
            height: 2px;
            background: linear-gradient(90deg, transparent, #00ffff, transparent);
        }

        .footer-text {
            color: #00ffff;
            opacity: 0.7;
            font-size: 0.85rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            text-shadow: 0 0 10px rgba(0, 255, 255, 0.5);
        }

        .footer-text span {
            color: #ff00ff;
        }

        /* 角落装饰 */
        .corner-decor {
            position: fixed;
            width: 150px;
            height: 150px;
            pointer-events: none;
            z-index: 0;
        }

        .corner-decor::before,
        .corner-decor::after {
            content: '';
            position: absolute;
            background: linear-gradient(90deg, #00ffff, transparent);
        }

        .corner-top-left {
            top: 20px;
            left: 20px;
        }

        .corner-top-left::before {
            width: 80px;
            height: 2px;
            top: 0;
            left: 0;
        }

        .corner-top-left::after {
            width: 2px;
            height: 80px;
            top: 0;
            left: 0;
        }

        .corner-bottom-right {
            bottom: 20px;
            right: 20px;
        }

        .corner-bottom-right::before {
            width: 80px;
            height: 2px;
            bottom: 0;
            right: 0;
            background: linear-gradient(270deg, #ff00ff, transparent);
        }

        .corner-bottom-right::after {
            width: 2px;
            height: 80px;
            bottom: 0;
            right: 0;
            background: linear-gradient(0deg, #ff00ff, transparent);
        }

        @media (max-width: 768px) {
            .author-name {
                font-size: 2.5rem;
                letter-spacing: 4px;
            }
            
            .nav-grid {
                grid-template-columns: 1fr;
                gap: 20px;
            }

            .author-title {
                font-size: 0.9rem;
            }
        }

        /* 加载动画 */
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .nav-card {
            animation: fadeIn 0.6s ease forwards;
            opacity: 0;
        }

        .nav-card:nth-child(1) { animation-delay: 0.1s; }
        .nav-card:nth-child(2) { animation-delay: 0.2s; }
        .nav-card:nth-child(3) { animation-delay: 0.3s; }
        .nav-card:nth-child(4) { animation-delay: 0.4s; }
        .nav-card:nth-child(5) { animation-delay: 0.5s; }
        .nav-card:nth-child(6) { animation-delay: 0.6s; }
    </style>
</head>
<body>
    <!-- 赛博朋克背景效果 -->
    <div class="cyber-bg"></div>
    <div class="grid-overlay"></div>
    <div class="scanline"></div>
    <div class="neon-dots" id="neonDots"></div>
    
    <!-- 角落装饰 -->
    <div class="corner-decor corner-top-left"></div>
    <div class="corner-decor corner-bottom-right"></div>

    <div class="container">
        <header class="header">
            <h1 class="author-name glitch">rubincai</h1>
            <p class="author-title">// 探索无限可能 · 创造精彩未来 \\</p>
        </header>

        <main>
            <div class="nav-grid">
                <a href="#" class="nav-card" id="link1">
                    <div class="nav-icon">
                        <i class="fas fa-blog"></i>
                    </div>
                    <h3 class="nav-title">个人博客</h3>
                    <p class="nav-desc">分享技术心得与生活感悟</p>
                    <div class="cyber-line line-top"></div>
                    <div class="cyber-line line-bottom"></div>
                </a>

                <a href="#" class="nav-card" id="link2">
                    <div class="nav-icon">
                        <i class="fas fa-code"></i>
                    </div>
                    <h3 class="nav-title">项目作品</h3>
                    <p class="nav-desc">展示我的创意与实践成果</p>
                    <div class="cyber-line line-top"></div>
                    <div class="cyber-line line-bottom"></div>
                </a>

                <a href="#" class="nav-card" id="link3">
                    <div class="nav-icon">
                        <i class="fas fa-camera-retro"></i>
                    </div>
                    <h3 class="nav-title">摄影作品</h3>
                    <p class="nav-desc">用镜头记录美好瞬间</p>
                    <div class="cyber-line line-top"></div>
                    <div class="cyber-line line-bottom"></div>
                </a>

                <a href="#" class="nav-card" id="link4">
                    <div class="nav-icon">
                        <i class="fas fa-envelope"></i>
                    </div>
                    <h3 class="nav-title">联系我</h3>
                    <p class="nav-desc">随时欢迎交流与合作</p>
                    <div class="cyber-line line-top"></div>
                    <div class="cyber-line line-bottom"></div>
                </a>

                <a href="#" class="nav-card" id="link5">
                    <div class="nav-icon">
                        <i class="fas fa-book"></i>
                    </div>
                    <h3 class="nav-title">学习笔记</h3>
                    <p class="nav-desc">记录学习过程中的点点滴滴</p>
                    <div class="cyber-line line-top"></div>
                    <div class="cyber-line line-bottom"></div>
                </a>

                <a href="#" class="nav-card" id="link6">
                    <div class="nav-icon">
                        <i class="fas fa-palette"></i>
                    </div>
                    <h3 class="nav-title">创意空间</h3>
                    <p class="nav-desc">展示我的艺术与设计作品</p>
                    <div class="cyber-line line-top"></div>
                    <div class="cyber-line line-bottom"></div>
                </a>
            </div>
        </main>

        <footer class="footer">
            <p class="footer-text">© 2025 <span>rubincai</span> // All Rights Reserved</p>
        </footer>
    </div>

    <script>
        // 生成随机霓虹闪烁点
        const neonDotsContainer = document.getElementById('neonDots');
        const numberOfDots = 50;

        for (let i = 0; i < numberOfDots; i++) {
            const dot = document.createElement('div');
            dot.className = 'dot';
            dot.style.left = Math.random() * 100 + '%';
            dot.style.top = Math.random() * 100 + '%';
            dot.style.animationDelay = Math.random() * 3 + 's';
            dot.style.animationDuration = (Math.random() * 2 + 2) + 's';
            neonDotsContainer.appendChild(dot);
        }

        // 为跳转链接添加交互功能
        const links = document.querySelectorAll('.nav-card');
        
        links.forEach(link => {
            link.addEventListener('click', function(e) {
                e.preventDefault();
                const linkId = this.id;
                const currentTitle = this.querySelector('.nav-title').textContent;
                
                // 创建赛博朋克风格的输入框
                const url = prompt(`[ CYBER LINK ]\n请输入 ${currentTitle} 的网址：`);
                
                if (url && url.trim() !== '') {
                    // 保存到本地存储
                    localStorage.setItem(linkId, url.trim());
                    this.querySelector('.nav-desc').innerHTML += '<br><span style="color:#00ffff;font-size:0.75rem;">[ LINK_CONFIGURED ✓ ]</span>';
                    
                    // 添加闪烁效果
                    this.style.animation = 'none';
                    setTimeout(() => {
                        this.style.animation = '';
                    }, 10);
                }
            });
        });

        // 页面加载时检查是否有保存的链接
        window.addEventListener('load', function() {
            links.forEach(link => {
                const savedUrl = localStorage.getItem(link.id);
                if (savedUrl) {
                    link.href = savedUrl;
                    link.target = '_blank';
                    link.style.cursor = 'pointer';
                    const descElement = link.querySelector('.nav-desc');
                    if (!descElement.innerHTML.includes('LINK_CONFIGURED')) {
                        descElement.innerHTML += '<br><span style="color:#00ffff;font-size:0.75rem;">[ LINK_CONFIGURED ✓ ]</span>';
                    }
                }
            });
        });

        // 添加鼠标跟踪光效
        document.addEventListener('mousemove', (e) => {
            const cards = document.querySelectorAll('.nav-card');
            cards.forEach(card => {
                const rect = card.getBoundingClientRect();
                const x = e.clientX - rect.left;
                const y = e.clientY - rect.top;
                
                card.style.setProperty('--mouse-x', `${x}px`);
                card.style.setProperty('--mouse-y', `${y}px`);
            });
        });
    </script>
</body>
</html>
